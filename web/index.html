<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mixai · 四模型对比</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">历史会话</span>
      <button id="newSessBtn" class="ghost">＋ 新会话</button>
    </div>
    <div id="sessionList" class="session-list"></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1>mixai</h1>
      <span class="subtitle">DeepSeek · Doubao · Kimi · ChatGPT 同时对比</span>
      <div id="providerFilter" class="provider-filter"></div>
      <div class="spacer"></div>
      <span id="conn" class="conn" title="连接状态">●</span>
    </header>

    <main id="grid" class="grid"><!-- panes injected by app.js --></main>

    <form id="composer" class="composer">
      <textarea id="input" rows="1" placeholder="输入一个问题，回车同时问四个模型（Shift+Enter 换行）"></textarea>
      <button id="sendBtn" type="submit">发送</button>
    </form>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
